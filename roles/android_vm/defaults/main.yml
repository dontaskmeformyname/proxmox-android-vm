---
# -------------------------------------------------------
# Proxmox API
# -------------------------------------------------------
proxmox_host: ""
proxmox_node: "pve"
proxmox_user: "root@pam"
proxmox_password: ""

# -------------------------------------------------------
# VM-Konfiguration
# -------------------------------------------------------
vm_name: "android-bliss"
vm_cores: 2
vm_memory: 8192        # MB
vm_disk_size: "128G"
vm_storage: "data"     # Proxmox Storage-Name für die VM-Disk
vm_bridge: "vmbr0"     # Netzwerk-Bridge
vm_start_after_create: true

# -------------------------------------------------------
# ISO / Template Storage
# -------------------------------------------------------
vm_iso_storage: "local"   # Proxmox Storage-Name für ISO-Ablage
# vm_iso_storage_path wird zur Laufzeit via pvesh ermittelt

# -------------------------------------------------------
# Bliss OS ISO
# ISO manuell herunterladen, prüfen und in den ISO-Storage des Proxmox Node legen.
# Download: https://sourceforge.net/projects/blissos-x86/files/Official/BlissOS16/Gapps/Generic/
# -------------------------------------------------------
blissos_iso_filename: "Bliss-v16.9.7-x86_64-OFFICIAL-gapps-20241011.iso"
