---
- name: VM starten
  community.proxmox.kvm:
    api_host: "{{ proxmox_host }}"
    api_user: "{{ proxmox_user }}"
    api_password: "{{ proxmox_password }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ vm_id }}"
    state: started

- name: Warten bis VM gestartet ist
  ansible.builtin.wait_for:
    timeout: 30

- name: VM erfolgreich gestartet
  ansible.builtin.debug:
    msg: "VM '{{ vm_name }}' (ID: {{ vm_id }}) wurde gestartet. Bliss OS bootet..."
