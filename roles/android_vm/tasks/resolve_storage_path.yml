---
- name: ISO Storage-Basispfad via pvesh ermitteln
  ansible.builtin.shell: >
    pvesh get /storage --output-format json
    | jq -r '.[] | select(.storage == "{{ vm_iso_storage }}") | .path'
  register: pvesh_storage_path_raw
  changed_when: false
  failed_when: pvesh_storage_path_raw.rc != 0 or pvesh_storage_path_raw.stdout | trim == ''

- name: ISO Storage-Pfad als Fact setzen
  ansible.builtin.set_fact:
    vm_iso_storage_path: "{{ pvesh_storage_path_raw.stdout | trim }}/template/iso"

- name: Prüfen ob ISO Storage-Verzeichnis existiert
  ansible.builtin.stat:
    path: "{{ vm_iso_storage_path }}"
  register: iso_storage_dir

- name: ISO Storage-Verzeichnis anlegen falls nicht vorhanden
  ansible.builtin.file:
    path: "{{ vm_iso_storage_path }}"
    state: directory
    mode: '0755'
  when: not iso_storage_dir.stat.exists

- name: Ermittelten ISO Storage-Pfad anzeigen
  ansible.builtin.debug:
    msg: "ISO Storage-Pfad: {{ vm_iso_storage_path }}"
