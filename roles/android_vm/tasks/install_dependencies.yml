---
- name: apt-Cache aktualisieren
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Benötigte Pakete installieren
  ansible.builtin.apt:
    name:
      - jq
      - xorriso
      - squashfs-tools
      - python3-proxmoxer
    state: present

- name: Prüfen ob xorriso verfügbar ist
  ansible.builtin.command: which xorriso
  register: xorriso_check
  changed_when: false

- name: Abbrechen wenn xorriso fehlt
  ansible.builtin.fail:
    msg: "'xorriso' ist nicht verfügbar, obwohl das Paket installiert wurde. Bitte manuell prüfen."
  when: xorriso_check.rc != 0

- name: Prüfen ob unsquashfs verfügbar ist
  ansible.builtin.command: which unsquashfs
  register: unsquashfs_check
  changed_when: false

- name: Abbrechen wenn unsquashfs fehlt
  ansible.builtin.fail:
    msg: "'unsquashfs' ist nicht verfügbar, obwohl squashfs-tools installiert wurde. Bitte manuell prüfen."
  when: unsquashfs_check.rc != 0
