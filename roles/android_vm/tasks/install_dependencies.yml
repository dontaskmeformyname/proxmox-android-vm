---
- name: apt-Cache aktualisieren
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "Paket installieren: wget"
  ansible.builtin.apt:
    name: wget
    state: present
  register: pkg_wget

- name: "Status: wget"
  ansible.builtin.debug:
    msg: "wget: {{ 'installiert' if pkg_wget.changed else 'bereits vorhanden' }}"

- name: "Paket installieren: jq"
  ansible.builtin.apt:
    name: jq
    state: present
  register: pkg_jq

- name: "Status: jq"
  ansible.builtin.debug:
    msg: "jq: {{ 'installiert' if pkg_jq.changed else 'bereits vorhanden' }}"

- name: "Paket installieren: libguestfs-tools"
  ansible.builtin.apt:
    name: libguestfs-tools
    state: present
  register: pkg_libguestfs

- name: "Status: libguestfs-tools"
  ansible.builtin.debug:
    msg: "libguestfs-tools: {{ 'installiert' if pkg_libguestfs.changed else 'bereits vorhanden' }}"

- name: "Paket installieren: python3-proxmoxer"
  ansible.builtin.apt:
    name: python3-proxmoxer
    state: present
  register: pkg_proxmoxer

- name: "Status: python3-proxmoxer"
  ansible.builtin.debug:
    msg: "python3-proxmoxer: {{ 'installiert' if pkg_proxmoxer.changed else 'bereits vorhanden' }}"

- name: Prüfen ob virt-customize verfügbar ist
  ansible.builtin.command: which virt-customize
  register: virtcustomize_check
  changed_when: false

- name: Abbrechen wenn virt-customize fehlt
  ansible.builtin.fail:
    msg: "'virt-customize' ist nicht verfügbar, obwohl libguestfs-tools installiert wurde. Bitte manuell prüfen."
  when: virtcustomize_check.rc != 0
